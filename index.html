<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>复习系统 — 日语 & 制度</title>
<style>
:root{--bg:#0f0f1a;--card:#1a1a2e;--gold:#e8a84c;--text:#e0e0e0;--dim:#888;--green:#4caf50;--red:#e74c3c;--blue:#4a9eff;--orange:#e8a84c;--border:#2a2a4a}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0 0 80px}
.tabs{display:flex;position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border)}
.tab{flex:1;padding:14px 8px;text-align:center;cursor:pointer;font-size:15px;font-weight:600;color:var(--dim);border-bottom:2px solid transparent;transition:.2s}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab .badge{display:inline-block;background:rgba(232,168,76,.2);color:var(--gold);font-size:11px;padding:1px 7px;border-radius:8px;margin-left:4px}
.panel{display:none;padding:12px}
.panel.active{display:block}
.header{text-align:center;padding:16px 0 8px}
.header h1{font-size:20px;color:var(--gold)}
.header .sub{font-size:13px;color:var(--dim);margin-top:2px}
.stats{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:8px 0 16px}
.stat{background:var(--card);padding:8px 14px;border-radius:10px;font-size:13px;border:1px solid var(--border)}
.stat .num{color:var(--gold);font-weight:700;font-size:16px}
.btn{background:var(--gold);color:#111;border:none;padding:10px 24px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:.2s}
.btn:hover{opacity:.85}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-dim{background:var(--border);color:var(--dim)}
.btn-outline{background:transparent;border:1px solid var(--gold);color:var(--gold)}
.card-grid{display:flex;flex-direction:column;gap:10px;max-width:600px;margin:0 auto}
.lyric-card{background:var(--card);border-radius:12px;padding:16px;border:1px solid var(--border);transition:.3s}
.lyric-card.locked{opacity:.35}
.lyric-card.locked .card-front,.lyric-card.locked .card-header{opacity:.2;pointer-events:none}
.lyric-card .unlock-area{opacity:1!important;pointer-events:auto!important}
.lyric-card.completed{border-color:var(--green);box-shadow:0 0 12px rgba(76,175,80,.15)}
.lyric-card.active{border-color:var(--gold);box-shadow:0 0 12px rgba(232,168,76,.15)}
.lyric-card.forgotten{opacity:.3;filter:grayscale(.7);pointer-events:none}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.line-num{color:var(--dim);font-size:12px}
.cycle-dots{display:flex;gap:3px}
.dot{width:10px;height:10px;border-radius:50%;background:var(--border);border:1px solid #333}
.dot.done{background:var(--gold);border-color:var(--gold)}
.dot.fail{background:var(--orange);opacity:.4;border-color:var(--orange)}
.japanese-text{font-size:18px;line-height:1.5;margin:4px 0 6px}
.reading-text{font-size:14px;color:var(--dim);margin-bottom:4px}
.actions{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}
.action-row{display:flex;gap:8px;margin-top:8px}
.status-badge{font-size:11px;padding:2px 8px;border-radius:6px}
.status-badge.locked{background:rgba(136,136,136,.2);color:var(--dim)}
.status-badge.completed{background:rgba(76,175,80,.2);color:var(--green)}
.status-badge.active{background:rgba(232,168,76,.2);color:var(--gold)}
.status-badge.waiting{background:rgba(136,136,136,.15);color:var(--dim)}
.status-badge.forgotten{background:rgba(231,76,60,.2);color:var(--red)}
.expand-content{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.expand-content.show{display:block}
.expand-toggle{color:var(--gold);font-size:13px;cursor:pointer;opacity:.7}
.expand-toggle:hover{opacity:1}
.chinese-text{color:#b8d4b8;font-size:15px;margin-bottom:8px;line-height:1.4}
.words-section{background:rgba(255,255,255,.04);border-radius:8px;padding:10px;margin:8px 0}
.word-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;font-size:13px}
.word-item{display:flex;gap:4px;align-items:baseline}
.word-kanji{color:var(--gold)}
.word-reading{color:var(--dim);font-size:12px}
.word-meaning{color:var(--text);font-size:12px}
.grammar-section{background:rgba(232,168,76,.06);border-radius:8px;padding:10px;margin:8px 0;font-size:13px;line-height:1.5;color:#ddd}
.grammar-section strong{color:var(--gold)}

/* Flashcard styles */
.flashcard-list{max-width:600px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
.fcard{background:var(--card);border-radius:12px;padding:16px;border:1px solid var(--border);cursor:pointer;transition:.3s;position:relative}
.fcard .q{font-size:15px;margin-bottom:8px;line-height:1.4}
.fcard .cat-tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:6px;margin-right:4px}
.cat-内控{background:rgba(232,168,76,.2);color:var(--gold)}
.cat-质量{background:rgba(74,158,255,.2);color:var(--blue)}
.cat-安全{background:rgba(106,191,106,.2);color:#6abf6a}
.cat-组织{background:rgba(155,89,182,.2);color:#9b59b6}
.cat-HPDS{background:rgba(52,152,219,.2);color:#3498db}
.cat-表单{background:rgba(231,76,60,.2);color:#e74c3c}
.cat-两化融合{background:rgba(26,188,156,.2);color:#1abc9c}
.fcard .src{font-size:11px;color:var(--dim);margin-top:6px}
.fcard .a-wrap{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.fcard .a-wrap.show{display:block}
.fcard .answer{color:#b8d4b8;font-size:14px;line-height:1.5;margin-bottom:8px}
.fcard .src-text{background:rgba(255,255,255,.03);border-radius:6px;padding:8px;font-size:12px;color:#999;line-height:1.5;margin:6px 0;border-left:3px solid var(--gold)}
.fcard .src-text .hl{color:var(--gold);font-weight:700}
.fcard .fc-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.fcard .fc-actions .btn{font-size:12px;padding:7px 14px}
.fcard.done{opacity:.25;pointer-events:none}
.fcard .review-count{font-size:11px;color:var(--dim);margin-top:6px}
.text-center{text-align:center}
.mt-8{margin-top:8px}

/* 密码锁 overlay */
.password-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:linear-gradient(160deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;transition:opacity .5s ease;
}
.password-overlay.hidden{opacity:0;pointer-events:none}
.password-box{
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  border-radius:20px;padding:40px 36px;max-width:380px;width:90%;
  text-align:center;
}
.password-box h2{color:var(--gold);font-size:20px;margin-bottom:6px}
.password-box p{color:var(--dim);font-size:13px;margin-bottom:24px}
.password-box input{
  width:100%;padding:12px 16px;border-radius:10px;border:1px solid var(--border);
  background:rgba(0,0,0,.3);color:#fff;font-size:16px;text-align:center;
  outline:none;transition:border-color .3s;
}
.password-box input:focus{border-color:var(--gold)}
.password-box .err{color:var(--red);font-size:13px;margin-top:8px;display:none}
.password-box .btn{width:100%;margin-top:16px}

</style>
</head>
<body>

<!-- 密码锁 -->
<div class="password-overlay" id="pwOverlay">
  <div class="password-box">
    <h2>🔒 复习系统</h2>
    <p>请输入密码访问</p>
    <input type="password" id="pwInput" placeholder="输入密码" autofocus onkeydown="if(event.key==='Enter')checkPassword()">
    <div class="err" id="pwErr">密码错误，请重试</div>
    <button class="btn" onclick="checkPassword()">进入</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="japanese" onclick="switchTab('japanese')">
    🇯🇵 日语复习 <span class="badge" id="jp-badge">28</span>
  </div>
  <div class="tab" data-tab="flashcard" onclick="switchTab('flashcard')">
    📋 制度卡片 <span class="badge" id="fc-badge">52</span>
  </div>
</div>

<!-- Japanese Panel -->
<div class="panel active" id="panel-japanese">
  <div class="header">
    <h1>🎵 冬の花</h1>
    <div class="sub">宮本浩次 — 艾宾浩斯复习</div>
  </div>
  <div class="stats" id="jp-stats"></div>
  <div class="text-center mt-8">
    <button class="btn btn-outline btn-sm" onclick="resetAllJapanese()">🔄 全部重置</button>
  </div>
  <div class="card-grid" id="jp-cards"></div>
</div>

<!-- Flashcard Panel -->
<div class="panel" id="panel-flashcard">
  <div class="header">
    <h1>📋 制度文件卡片</h1>
    <div class="sub">汇众汽车 — 52道制度知识题</div>
  </div>
  <div class="stats" id="fc-stats"></div>
  <div class="flashcard-list" id="fc-cards"></div>
</div>

<script>
// ===== 密码锁 =====
const PW_HASH = "15b366da8611e06e816d5a0015e87b3a97faca20b48219aa23fe4f8da347f16d"; // sha256("stanleymidi")
async function checkPassword(){
  const input = document.getElementById('pwInput').value;
  const enc = new TextEncoder();
  const buf = await crypto.subtle.digest('SHA-256', enc.encode(input));
  const hash = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  if(hash === PW_HASH){
    document.getElementById('pwOverlay').classList.add('hidden');
    document.getElementById('pwInput').blur();
    sessionStorage.setItem('review_auth','1');
  } else {
    document.getElementById('pwErr').style.display='block';
    document.getElementById('pwInput').value='';
    document.getElementById('pwInput').focus();
  }
}
// 已登录过的会话直接跳过密码
if(sessionStorage.getItem('review_auth')==='1'){
  document.getElementById('pwOverlay').classList.add('hidden');
}

const FLASHCARDS = [
  {id:"ic01",q:"汇众内控体系以什么框架为理论基础？",a:"COSO内部控制框架（五要素），结合华域汽车管控要求，扩展为八大要素体系。",src:"01-CE控制环境D1",cat:"内控",chap:"控制环境(CE)",src_text:"以COSO内部控制框架为理论基础，结合华域汽车系统股份有限公司《内部控制手册》（3.0版）的管控要求，构建了CE+RA+IC+MO+CA系列八大要素体系。",hl:"COSO内部控制框架"},
  {id:"ic02",q:"汇众内控八大要素分别是哪些？",a:"管理控制层：CE/RA/IC/MO；业务控制层：CA系列（CA-SP/BU/HR/FR/CT/TA/PP/RE/FA/IM/CC/LA/TR/OI/IA/IT/RD/QM/SA/EV/RP/SI）",src:"01-CE控制环境D1",cat:"内控",chap:"控制环境(CE)",src_text:"汇众公司以COSO内部控制框架为理论基础，构建了“CE+RA+IC+MO+CA系列”八大要素体系。其中CE/RA/IC/MO为管理控制层，CA系列为业务控制层，按业务域划分。",hl:"CE/RA/IC/MO"},
  {id:"ic03",q:"内控缺陷分哪几个等级？重大缺陷的财务报告门槛是多少？",a:"三级：重大缺陷、重要缺陷、一般缺陷。重大缺陷：≥资产总额2% 或 ≥营业收入2% 或 ≥净利润10%。",src:"RA0201内部控制缺陷认定标准D0",cat:"内控",chap:"风险评估(RA)",src_text:"重大缺陷：财务报告错报金额≥资产总额2%或≥营业收入2%或≥净利润10%；非财务报告资产损失按企业规模分级。重要缺陷：≥资产总额1%或≥营业收入1%或≥净利润5%。一般缺陷：其他错报。",hl:"重大缺陷：≥资产总额2%或≥营业收入2%或≥净利润10%"},
  {id:"ic04",q:"内控建设得分公式是什么？",a:"100 - 100×(重大×50+重要×10+一般×2)/检查点 - 未整改重大×3 - 未整改重要×2 - 未整改一般×1",src:"RA0201内部控制缺陷认定标准D0",cat:"内控",chap:"风险评估(RA)",src_text:"内控建设得分=100-100×(重大×50+重要×10+一般×2)/审计检查点-未整改重大×3-未整改重要×2-未整改一般×1，部门绩效计分采用该公式。",hl:"内控建设得分=100-100×(重大×50+重要×10+一般×2)/审计检查点"},
  {id:"ic05",q:"公司级管理文件的编号格式是什么？",a:"SHAC-{架构分类}/{流程域代号}.{L2}.{L3}-{文件类型}[V版本]。类型：MA手册、PL制度、PR流程、ST标准、FM表单、AG协议、CT合同。",src:"CG5.2-ST-管理文件控制程序V1.0",cat:"内控",chap:"制度文档管理(CE09)",src_text:"手册、制度类编号样式：SHAC-S/CG5.2.1-PR[V1.0]；表单类、协议模板及合同模板编号样式：SHAC/FM-CG002[V1]。",hl:"SHAC-S/CG5.2.1-PR[V1.0]"},
  {id:"ic06",q:"公司级文件正文的8个固定章节是什么？",a:"1.0描述 2.0术语 3.0图示 4.0职责 5.0规定 6.0业务流程(6.1流程图+6.2流程说明) 7.0表单 8.0附录",src:"CG5.2-ST-管理文件控制程序V1.0",cat:"内控",chap:"制度文档管理(CE09)",src_text:"正文包括：描述、术语、图示、职责、规定、业务流程、表单、附录等8项固定内容。其中业务流程下设6.1流程图和6.2流程说明。",hl:"描述、术语、图示、职责、规定、业务流程、表单、附录"},
  {id:"ic07",q:"13个流程域中生产制造域、EHS域、党群管理域的负责部门各是？",a:"生产制造域→运控部、EHS域→安保部、党群管理域→党群部。",src:"CG5.2-ST-管理文件控制程序V1.0",cat:"内控",chap:"制度文档管理(CE09)",src_text:"流程域负责部门：生产制造域--运控部；EHS域--安保部；党群管理域--党群部。",hl:"生产制造域--运控部；EHS域--安保部；党群管理域--党群部"},
  {id:"ic08",q:"会计档案的保管期限分哪几类？什么情况下不得销毁？",a:"永久、定期10年、定期30年。未结清的债权债务原始凭证和涉及其他未了事项的凭证不得销毁。",src:"CA-FR0601会计档案管理规定D0",cat:"内控",chap:"财务报告(CA-FR)",src_text:"会计档案保管期限分永久和定期两类，定期又分为10年和30年。保管期满但未结清的债权债务原始凭证和涉及其他未了事项的原始凭证不得销毁。",hl:"未结清的债权债务原始凭证和涉及其他未了事项的原始凭证不得销毁"},
  {id:"ic09",q:"信息系统密码策略要求是什么？",a:"至少12位(含大小写+数字+特殊字符)；每90天更换；9个月不重复；6次失败自动锁住；远程须双因素认证。",src:"CA-IT0101信息系统安全管理制度D1",cat:"内控",chap:"信息系统(CA-IT)",src_text:"密码至少12位（含大小写+数字+特殊字符）；至少每90天更改；9个月内不得重复使用；连续6次登录失败自动锁住；远程登录须通过堡垒机+双因素认证。",hl:"至少12位（含大小写+数字+特殊字符）；至少每90天更改"},
  {id:"ic10",q:"安全生产'五同时'是指什么？",a:"在计划、布置、检查、总结、评比生产工作的同时，同时计划、布置、检查、总结、评比安全工作。",src:"CA-SA0201安全五同时管理制度D0",cat:"内控",chap:"安全监督(CA-SA)",src_text:"在计划、布置、检查、总结、评比生产工作的时候，同时计划、布置、检查、总结、评比安全工作。",hl:"同时计划、布置、检查、总结、评比安全工作"},
  {id:"ic11",q:"危险作业包括哪些种类？审批要求？",a:"高处作业、带电作业、明火易燃作业、爆破作业、中毒窒息作业、受限空间作业。须安全管理部门审批。",src:"CA-SA0208危险作业及电气临时线审批制度D0",cat:"内控",chap:"安全监督(CA-SA)",src_text:"危险作业种类包括高处作业、带电作业、明火易燃作业、爆破作业、中毒窒息作业、受限空间作业等，须需求部门负责人+安全管理部门审批。",hl:"高处作业、带电作业、明火易燃作业、爆破作业、中毒窒息作业、受限空间作业"},
  {id:"ic12",q:"外来施工安全抵押款比例是多少？",a:"合同金额的1%~5%。",src:"CA-SA0216外来施工安全管理规定D0",cat:"内控",chap:"安全监督(CA-SA)",src_text:"外来施工单位须缴纳合同金额1%-5%的施工安全抵押款，并在安全保障部办理安全手续后进场。",hl:"合同金额1%-5%"},
  {id:"ic13",q:"一次性外协金额门槛是多少？",a:"50万元以上须经总经理批准。",src:"CA-IM0301一次性外协管理规定D1",cat:"内控",chap:"存货管理(CA-IM)",src_text:"一次性外协申请金额50万以上须经总经理批准，50万元以下按部门级审批流程执行。",hl:"50万以上须经总经理批准"},
  {id:"ic14",q:"银行账户开立的审批链条是什么？",a:"资金计划人员填表→财务管理科经理审核→财务部总监复核→总经理审批。母公司账户还须上报华域财务部批准。",src:"FIN4.1-PL-银行账户管理V1.0",cat:"内控",chap:"货币资金(CA-TR)",src_text:"财务管理科资金计划人员填写《账户开立/销户申请表》，财务管理科经理审核，财务部总监复核签字，报总经理审批。母公司账户应上报华域汽车财务部批准。",hl:"财务管理科经理审核，财务部总监复核签字，报总经理审批"},
  {id:"ic15",q:"银行账户销户的判定标准？",a:"一年内无资金变动(结息除外)的账户，经判定后销户。销户后SAP中冻结对应明细科目。",src:"FIN4.1-PL-银行账户管理V1.0",cat:"内控",chap:"货币资金(CA-TR)",src_text:"已开设未使用或长期不使用的账户一般为在一年内没有资金变动（结息除外）的账户。销户后由总账在SAP中将相应账户明细科目冻结。",hl:"一年内没有资金变动（结息除外）"},
  {id:"ic16",q:"坏账确认的标准有哪些？",a:"债务人破产、死亡、逾期超三年等。已核销坏账须账销案存继续追索。",src:"CA-FR0502坏账报损管理规定D0",cat:"内控",chap:"财务报告(CA-FR)",src_text:"坏账确认标准：债务人破产、死亡、逾期未履行偿债义务超过三年等。坏账核销须经审批流程（按金额分级审批），已核销坏账须账销案存，继续追索。",hl:"债务人破产、死亡、逾期未履行偿债义务超过三年"},
  {id:"ic17",q:"差旅费住宿和补贴标准？",a:"一般人员住宿300元/天，补贴50元/天。",src:"CA-CC0301差旅费开支规定D2",cat:"内控",chap:"成本费用(CA-CC)",src_text:"差旅费开支规定：一般人员住宿标准300元/天，补贴50元/天。超标需经部门负责人审批。",hl:"住宿标准300元/天，补贴50元/天"},
  {id:"ic18",q:"内控三列表结构用于什么？",a:"CA系列各业务要素统一格式，每个子要素按此结构编写，形成可追溯的风险控制链条。",src:"CA系列总纲文件",cat:"内控",chap:"内控体系总论",src_text:"各CA要素均采用统一的“风险—控制目标—关键控制活动”三列表结构，每个子要素按此编写，形成可追溯的风险控制链条。",hl:"风险—控制目标—关键控制活动"},
  {id:"ic19",q:"哪些流程域属于运作类(O)？",a:"研发域(R&D)、市场营销管理域(MKT)、采购与供应链管理域(PUR)、生产制造管理域(PRD)。",src:"CG5.2-ST-管理文件控制程序V1.0",cat:"内控",chap:"制度文档管理(CE09)",src_text:"运作类(O)包含：研发域(R&D)、市场营销管理域(MKT)、采购与供应链管理域(PUR)、生产制造管理域(PRD)。",hl:"研发域(R&D)、市场营销管理域(MKT)、采购与供应链管理域(PUR)、生产制造管理域(PRD)"},
  {id:"ic20",q:"重大纠纷的金额门槛是多少？",a:"标的500万元。",src:"CA-LA法律事务管理",cat:"内控",chap:"法律事务(CA-LA)",src_text:"法律事务管理规定中，重大纠纷的认定标准为涉案标的500万元。",hl:"标的500万元"},
  {id:"qm01",q:"汇众公司的质量方针是什么？",a:"遵标准、重预防、严执行、敢担当、追求零缺陷。",src:"01质量管理手册J7",cat:"质量",chap:"质量手册",src_text:"质量方针：“遵标准、重预防、严执行、敢担当、追求零缺陷”。遵标准即遵守标准；重预防即绿色制造+风险思维+APQP+FMEA+零缺陷防错；严执行为“三不原则”；敢担当即“我交付，我负责”；追求零缺陷即“第一次把事情做对”。",hl:"遵标准、重预防、严执行、敢担当、追求零缺陷"},
  {id:"qm02",q:"IATF 16949三大过程分类各多少个？",a:"COP(顾客导向过程)7个、MP(管理过程)4个、SP(支持过程)8个。",src:"01质量管理手册J7",cat:"质量",chap:"质量手册",src_text:"质量管理体系按过程模式分为三大类：COP顾客导向过程7个、MP管理过程4个、SP支持过程8个。",hl:"COP7个、MP4个、SP8个"},
  {id:"qm03",q:"7个COP分别是哪些？",a:"C01市场及营销、C02先期研发、C03产品项目开发、C04产品及过程变更、C05计划、C06制造与交付、C07顾客服务及反馈。",src:"01质量管理手册J7",cat:"质量",chap:"质量手册",src_text:"七个顾客导向过程：C01市场及营销、C02先期研究与开发、C03产品项目开发、C04产品及过程变更、C05计划、C06制造与交付、C07顾客服务及反馈。",hl:"C01-C07"},
  {id:"qm04",q:"APQP四个阶段是什么？",a:"①项目启动与产品设计开发 → ②产品设计验证(DV) → ③过程设计与开发(PV) → ④产品与过程确认(PPAP)",src:"SH质B C0301 APQP控制程序J3",cat:"质量",chap:"APQP(C03)",src_text:"产品质量先期策划（APQP）分四阶段：阶段1项目启动与产品设计开发；阶段2产品设计验证；阶段3过程设计与开发；阶段4产品与过程确认（PPAP）。",hl:"项目启动→设计验证→过程开发→PPAP"},
  {id:"qm05",q:"GR3、GR4、GR5、GR6分别对应什么？",a:"GR3=TG2数据发布(工程冻结)、GR4=项目批准、GR5=SOP(正式供货)、GR6=项目总结关闭。",src:"SH质C C030101新产品PV项目管理J6",cat:"质量",chap:"APQP(C03)",src_text:"项目里程碑关卡评审：GR3为TG2数据发布（工程冻结），GR4为项目批准，GR5为正式供货（SOP），GR6为项目总结与关闭。",hl:"GR3=TG2, GR4=批准, GR5=SOP, GR6=关闭"},
  {id:"qm06",q:"制造与交付的7个步骤？",a:"①生产计划→②生产准备→③首件验证→④正式生产+过程控制→⑤成品入库→⑥报交出库→⑦运输交付",src:"SH质B C0601制造与交付控制程序J1",cat:"质量",chap:"制造交付(C06)",src_text:"制造与交付流程七步骤：生产计划与物料计划下达→生产准备→首件验证→正式生产+过程确认→成品下线入库→报交出库→运输交付客户。",hl:"生产计划→生产准备→首件验证→正式生产→成品入库→报交出库→运输交付"},
  {id:"qm07",q:"过程能力CPK要求？",a:"CPK > 1.33",src:"SH质C C060101过程能力控制J1",cat:"质量",chap:"制造交付(C06)",src_text:"过程能力要求CPK>1.33。特殊过程（铸造、焊接、探伤、表面处理等）需确认。",hl:"CPK>1.33"},
  {id:"qm08",q:"产品审核的频次与范围？",a:"每年≥1次全覆盖，覆盖所有产品组。",src:"C060702产品审核控制程序J2",cat:"质量",chap:"制造交付(C06)",src_text:"产品审核每年至少进行一次全覆盖审核，覆盖所有产品组。",hl:"每年≥1次全覆盖"},

// ===== STORAGE =====
function getJpProgress(){try{return JSON.parse(localStorage.getItem('jp_progress'))||{}}catch(e){return{}}}
function setJpProgress(p){localStorage.setItem('jp_progress',JSON.stringify(p))}
function getFcProgress(){try{return JSON.parse(localStorage.getItem('fc_progress'))||{}}catch(e){return{}}}
function setFcProgress(p){localStorage.setItem('fc_progress',JSON.stringify(p))}

// ===== JAPANESE =====
function today(){return new Date().toISOString().slice(0,10)}
function tomorrow(){const d=new Date();d.setDate(d.getDate()+1);return d.toISOString().slice(0,10)}
function addDays(d,n){const dt=new Date(d);dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10)}

function getJpState(lineId){
  const p=getJpProgress();
  if(!p[lineId])return {status:'locked',cycle:0,reviews:0,unlockedAt:null,lastReview:null,nextReview:null};
  return p[lineId];
}
function saveJpState(lineId,s){
  const p=getJpProgress();p[lineId]=s;setJpProgress(p);
}
function isDue(s){
  if(s.status==='active')return s.nextReview&&s.nextReview<=today();
  if(s.status==='forgotten')return s.nextReview&&s.nextReview<=today();
  return false;
}
function renderJapanese(){
  const pg=getJpProgress();
  const total=JAPANESE_SONG.lines.length;
  let locked=0,active=0,completed=0,waiting=0,forgotten=0;
  JAPANESE_SONG.lines.forEach(l=>{
    const s=pg[l.id]||{status:'locked'};
    if(s.status==='locked')locked++;
    else if(s.status==='completed')completed++;
    else if(s.status==='waiting'||(s.status==='active'&&!isDue(s)))waiting++;
    else if(s.status==='forgotten'&&!isDue(s))forgotten++;
    else if(s.status==='active'||isDue(s))active++;
  });
  document.getElementById('jp-stats').innerHTML=
    `<div class="stat">🔒 <span class="num">${locked}</span><br>未解锁</div>`+
    `<div class="stat">⭐ <span class="num">${active}</span><br>待复习</div>`+
    `<div class="stat">⏳ <span class="num">${waiting}</span><br>等待中</div>`+
    `<div class="stat">✅ <span class="num">${completed}</span><br>已完成</div>`;
  document.getElementById('jp-badge').textContent=active;

  let html='';
  JAPANESE_SONG.lines.forEach((l,i)=>{
    const s=getJpState(l.id);
    const cls=s.status==='locked'?'locked':s.status==='completed'?'completed':(isDue(s)?'active':(s.status==='forgotten'?'forgotten':''));
    const statusLabel={locked:'🔒 未解锁','active':'⭐ 待复习',waiting:'⏳ 等待中',completed:'✅ 已完成',forgotten:'🔄 明天重试'}[s.status]||s.status;
    let dots='';
    for(let c=0;c<6;c++){
      if(c<s.cycle)dots+=`<span class="dot done"></span>`;
      else if(c===s.cycle&&s.status==='forgotten'&&s.cycle>0)dots+=`<span class="dot fail"></span>`;
      else dots+=`<span class="dot"></span>`;
    }
    const idx=i+1;
    html+=`<div class="lyric-card ${cls}" id="jp-${l.id}">
      <div class="card-header">
        <span class="line-num">#${idx}</span>
        <span class="cycle-dots">${dots}</span>
      </div>
      <div class="japanese-text">${l.japanese}</div>
      <div class="reading-text">${l.reading}</div>
      <div><span class="status-badge ${s.status}">${statusLabel}</span> ${s.reviews>0?`<span style="font-size:11px;color:var(--dim)">复习${s.reviews}次</span>`:''}</div>
      <div class="action-row unlock-area" style="${s.status!=='locked'?'display:none':''}">
        <button class="btn btn-sm" onclick="unlockLine('${l.id}')">🔓 解锁开启复习</button>
      </div>
      <div class="action-row" style="${s.status==='locked'?'display:none':''}">
        ${(isDue(s)&&(s.status==='active'||s.status==='forgotten'))?`
          <button class="btn btn-sm btn-green" onclick="reviewJp('${l.id}','remember')">✅ 记住了</button>
          <button class="btn btn-sm btn-red" onclick="reviewJp('${l.id}','forgot')">🔄 忘了</button>
        `:s.status==='waiting'?`<span style="font-size:13px;color:var(--dim)">下次复习：${s.nextReview||'待定'}</span>`:''}
        <button class="btn btn-sm btn-dim" onclick="resetLine('${l.id}')">🔄 重置</button>
      </div>
      <div class="expand-toggle" onclick="toggleExpand('jp-expand-${l.id}')">👆 点击展开详情</div>
      <div class="expand-content" id="jp-expand-${l.id}">
        <div class="chinese-text">${l.chinese}</div>
        <div class="words-section"><div class="word-grid">${l.words.map(w=>`<div class="word-item"><span class="word-kanji">${w[0]}</span><span class="word-reading">${w[1]}</span><span class="word-meaning"> — ${w[2]}</span></div>`).join('')}</div></div>
        <div class="grammar-section">${l.grammar.replace(/\n/g,'<br>')}</div>
      </div>
    </div>`;
  });
  document.getElementById('jp-cards').innerHTML=html;
}
function unlockLine(id){
  const s={status:'active',cycle:0,reviews:0,unlockedAt:today(),lastReview:null,nextReview:tomorrow()};
  saveJpState(id,s);renderJapanese();
}
function reviewJp(id,action){
  const s=getJpState(id);
  if(action==='remember'){
    s.cycle++;s.reviews=(s.reviews||0)+1;
    s.lastReview=today();s.status='waiting';
    if(s.cycle>=6){s.status='completed';s.nextReview=null;}
    else{s.nextReview=addDays(today(),EBBINGHAUS[s.cycle-1]);}
  }else{
    s.reviews=(s.reviews||0)+1;s.lastReview=today();s.status='forgotten';s.nextReview=tomorrow();
  }
  saveJpState(id,s);renderJapanese();
}
function resetLine(id){
  const s={status:'locked',cycle:0,reviews:0,unlockedAt:null,lastReview:null,nextReview:null};
  saveJpState(id,s);renderJapanese();
}
function resetAllJapanese(){
  if(!confirm('确定全部重置？所有复习进度将清零。'))return;
  setJpProgress({});renderJapanese();
}

// ===== FLASHCARDS =====
function renderFlashcards(){
  const pg=getFcProgress();
  const total=FLASHCARDS.length;
  let known=0,activeCount=0;
  FLASHCARDS.forEach(f=>{
    const s=pg[f.id];
    if(!s){activeCount++;return}
    if(s.status==='known')known++;
    else activeCount++;
  });
  document.getElementById('fc-stats').innerHTML=
    `<div class="stat">📋 <span class="num">${total}</span><br>总题数</div>`+
    `<div class="stat">📚 <span class="num">${activeCount}</span><br>待复习</div>`+
    `<div class="stat">✅ <span class="num">${known}</span><br>已掌握</div>`;
  document.getElementById('fc-badge').textContent=activeCount;

  let html='';
  FLASHCARDS.forEach(f=>{
    const s=pg[f.id];
    const done=s&&s.status==='known';
    const revCount=s?((s.count||0)+(s.forgottenCount||0)||0):0;
    const isNew=!s;
    html+=`<div class="fcard ${done?'done':''}" id="fc-${f.id}">
      <div>
        <span class="cat-tag cat-${f.cat}">${f.cat}</span>
        <span style="font-size:11px;color:var(--dim)">${f.chap}</span>
      </div>
      <div class="q">${isNew?'❓ ':'🔄 '}${f.q}</div>
      <div class="src">📎 ${f.src}</div>
      ${done?`<div style="margin-top:6px;font-size:12px;color:var(--green)">✅ 已掌握</div>`:`
      <div class="a-wrap" id="fc-answer-${f.id}">
        <div class="answer">${f.a}</div>
        <div class="src-text">${f.src_text.replace(f.hl,`<span class="hl">${f.hl}</span>`)}</div>
        ${f.hl?`<div style="font-size:11px;color:var(--gold);margin-top:4px">💡 ${f.hl}</div>`:''}
        ${revCount>0?`<div class="review-count">已复习 ${revCount} 次</div>`:''}
        <div class="fc-actions">
          <button class="btn btn-green btn-sm" onclick="reviewFc('${f.id}','known')">✅ 我知道了</button>
          <button class="btn btn-outline btn-sm" onclick="reviewFc('${f.id}','review')">🔁 7天后再考</button>
          <button class="btn btn-dim btn-sm" onclick="resetFc('${f.id}')">🔄 重置为未复习</button>
        </div>
      </div>
      <button class="btn btn-outline btn-sm" onclick="toggleAnswer('${f.id}')" style="margin-top:8px">👆 查看答案</button>`}
    </div>`;
  });
  document.getElementById('fc-cards').innerHTML=html;
}
function toggleAnswer(id){
  const el=document.getElementById('fc-answer-'+id);
  if(el)el.classList.toggle('show');
}
function reviewFc(id,action){
  const pg=getFcProgress();
  if(!pg[id])pg[id]={count:0,forgottenCount:0,status:'learning'};
  if(action==='known'){pg[id].count=(pg[id].count||0)+1;pg[id].status='known';}
  else{pg[id].forgottenCount=(pg[id].forgottenCount||0)+1;pg[id].status='learning';}
  setFcProgress(pg);
  document.getElementById('fc-answer-'+id).classList.remove('show');
  renderFlashcards();
}
function resetFc(id){
  const pg=getFcProgress();
  delete pg[id];setFcProgress(pg);
  document.getElementById('fc-answer-'+id).classList.remove('show');
  renderFlashcards();
}

// ===== NAV =====
function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===name));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+name));
  if(name==='japanese')renderJapanese();
  else renderFlashcards();
}
function toggleExpand(id){
  const el=document.getElementById(id);
  if(el)el.classList.toggle('show');
}

// ===== INIT =====
renderJapanese();
renderFlashcards();
</script>
</body>
</html>
